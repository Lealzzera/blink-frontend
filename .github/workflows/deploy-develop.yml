name: Deploy Frontend Develop

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build
        
      - name: List build directories
        run: |
          echo "Listing directories to find build output:"
          ls -la
          if [ -d "out" ]; then echo "out directory exists"; fi
          if [ -d "dist" ]; then echo "dist directory exists"; fi
          if [ -d "build" ]; then echo "build directory exists"; fi
          if [ -d ".next" ]; then echo ".next directory exists"; fi
        
      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next/,out/,dist/,build/,public/,index.html"
          target: "/opt/frontend-dev"
          strip_components: 0
          rm: true
          
      - name: Set permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R www-data:www-data /opt/frontend-dev
            sudo chmod -R 755 /opt/frontend-dev
