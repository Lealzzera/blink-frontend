name: Deploy Frontend Develop

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Create next.config.js for static export
        run: |
          echo 'module.exports = { 
            output: "export",
            distDir: "out",
            // Excluir rotas dinâmicas da exportação estática
            exportPathMap: async function() {
              return {
                "/": { page: "/" },
                "/dashboard": { page: "/dashboard" },
                "/calendar": { page: "/calendar" },
                "/config": { page: "/config" },
                "/auth/login": { page: "/auth/login" },
                "/auth/forgot-password": { page: "/auth/forgot-password" },
                "/auth/sign-up": { page: "/auth/sign-up" },
                "/auth/sign-up-success": { page: "/auth/sign-up-success" },
                "/auth/update-password": { page: "/auth/update-password" },
                "/update-password": { page: "/update-password" }
              };
            }
          };' > next.config.js
        
      - name: Build static site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build
        
      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.HOST }}
          username: blink
          password: Blink10@
          local_path: ./out/*
          remote_path: /opt/frontend-dev/out/
          sftpArgs: '-o StrictHostKeyChecking=no'
