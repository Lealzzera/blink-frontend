name: Deploy Frontend Develop

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Create next.config.js for static export
        run: |
          echo 'module.exports = { 
            output: "export",
            distDir: "out"
          };' > next.config.js
        
      - name: Modify dynamic routes to be static
        run: |
          # Criar arquivo temporário para substituir rotas dinâmicas
          mkdir -p app/auth/confirm
          echo 'export default function ConfirmPage() { return <div>Esta página requer funcionalidades dinâmicas e não está disponível no ambiente de teste.</div>; }' > app/auth/confirm/page.js
          
          # Substituir página de erro que usa searchParams
          mkdir -p app/auth/error
          echo 'export default function ErrorPage() { return <div>Esta página requer funcionalidades dinâmicas e não está disponível no ambiente de teste.</div>; }' > app/auth/error/page.js
        
      - name: Build static site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build
        
      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.HOST }}
          username: blink
          password: Blink10@
          local_path: ./out/*
          remote_path: /opt/frontend-dev/out/
          sftpArgs: '-o StrictHostKeyChecking=no'
