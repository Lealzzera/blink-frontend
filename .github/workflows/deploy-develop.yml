name: Deploy Frontend Develop

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build
        
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Limpar diretório de destino
            rm -rf /opt/frontend-dev/*
            mkdir -p /tmp/frontend-build
            
      # Tentar cada pasta de build possível
      - name: Deploy build files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next/**,out/**,dist/**,build/**,public/**,index.html"
          target: "/tmp/frontend-build"
          strip_components: 0
          rm: false
          
      - name: Finalize deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Mover arquivos para o diretório final
            cp -r /tmp/frontend-build/* /opt/frontend-dev/ || echo "No files to copy"
            
            # Limpar diretório temporário
            rm -rf /tmp/frontend-build
            
            # Ajustar permissões
            sudo chown -R www-data:www-data /opt/frontend-dev
            sudo chmod -R 755 /opt/frontend-dev
            
            # Listar arquivos para verificar
            echo "Conteúdo do diretório /opt/frontend-dev:"
            ls -la /opt/frontend-dev

