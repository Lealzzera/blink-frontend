name: Deploy Frontend (Next.js) to Hetzner

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_BLINK_BE_BASE_URL=${{ secrets.NEXT_PUBLIC_BLINK_BE_DEV_BASE_URL }} \
            --build-arg NEXT_PUBLIC_BLINK_BE_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_BLINK_BE_PUBLIC_WS_URL }} \
            --build-arg NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }} \
            -t blink-fe .

      - name: Exportar Docker image
        run: docker save blink-fe | gzip > blink-fe.tar.gz

      - name: Enviar imagem para Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "blink-fe.tar.gz"
          target: "/opt/frontend/dev/"

      - name: Rodar container no servidor
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker load < /opt/frontend/dev/blink-fe.tar.gz

            docker stop blink-fe-dev || true
            docker rm blink-fe-dev || true

            docker run -d \
              --name blink-fe-dev \
              -p 3002:3000 \
              --restart unless-stopped \
              --network blink-docker-network \
              blink-fe
